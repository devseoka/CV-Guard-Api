name: CI/CD Pipeline for CV Guard API on Azure

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [develop]
env:
  APP_SOLUTION_FILE: './CV-Guard-Api.sln'
  APP_API_PROJECT: './Cv.Guard.Api/Cv.Guard.Api.csproj'
  APP_TEST_PROJECT: './Cv.Guard.Tests/Cv.Guard.Tests.csproj'
  PUBLISH_PATH: './publish'
  DOTNET_VER: '8.x'
  AZURE_WEBAPP_NAME: 'api-sds-cv-guard'

jobs:
  build:
    name: Build and Publish Application
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/packages.config', '**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Cache Build Outputs
        uses: actions/cache@v3
        with:
          path: "**/bin\n**/obj"
          key: ${{ runner.os }}-build-${{ github.sha }}
          restore-keys: ${{ runner.os }}-build-

      - name: Restore Dependencies
        run: dotnet restore ${{ env.APP_SOLUTION_FILE }}

      - name: Validate Build Settings
        if: github.base_ref == 'develop'
        run: |
          if (!(Test-Path './Cv.Guard.Api/appsettings.json')) {
            Write-Host "Error: appsettings.json not found!"
            exit 1
          }
        shell: pwsh

      - name: Configure Build Settings
        run: |
          $config = Get-Content ./Cv.Guard.Api/appsettings.json | ConvertFrom-Json
          $config.ConnectionStrings.DefaultConnection = "${{ secrets.AZURE_SQL_SERVER_CONNECTION_STRING }}"
          $config.AzureBlob.ConnectionString = "${{ secrets.AZURE_FILE_STORAGE_CONNECTION_STRING }}"
          $config.AzureBlob.Name = "${{ secrets.AZURE_FILE_STORAGE_CONTAINER_NAME }}"
          $config.Postmark.Key = "${{ secrets.POSTMARK_API_KEY }}"
          $config.IpStack.ApiKey = "${{ secrets.IPSTACK_API_KEY }}"
          $config | ConvertTo-Json -Depth 10 | Set-Content ./Cv.Guard.Api/appsettings.json
        shell: pwsh

      - name: Build Application
        run: dotnet build --configuration Release ${{ env.APP_SOLUTION_FILE }}

      - name: Publish Application
        run: dotnet publish ${{ env.APP_API_PROJECT }} -c Release -o "${{ env.DOTNET_ROOT }}/${{env.AZURE_WEBAPP_NAME}}"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/${{env.AZURE_WEBAPP_NAME}}

  integration-tests:
    name: Run Integration Tests
    if: github.event.action != 'closed' || github.event.pull_request.merged != true
    runs-on: windows-latest
    needs: [build]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Integration Tests
        run: dotnet build ${{ env.APP_TEST_PROJECT}} --configuration Release

      - name: Run Integration Tests
        run: dotnet test ${{ env.APP_TEST_PROJECT }} --configuration Release --no-build --verbosity normal

  deploy:
    name: Deploy to Azure Web App
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: windows-latest
    needs: [integration-tests]
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F40672CF50DD4CC08C0A3E4452ACCF52 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C4C46E97AA6C411CBF4DC419E25F798A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_17F66040F75C4F57A1CFD5926454B3C4 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cv-guard-api'
          slot-name: 'Production'
          package: .